services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mdm
      POSTGRES_USER: mdm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    image: ghcr.io/foylaou/mdm-api:latest
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://mdm:${POSTGRES_PASSWORD:-mdm}@postgres:5432/mdm?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      MICROMDM_URL: ${MICROMDM_URL}
      MICROMDM_API_KEY: ${MICROMDM_API_KEY}
      WEBSOCKET_URL: ${WEBSOCKET_URL}
      VPP_TOKEN_PATH: ${VPP_TOKEN_PATH:-}
      LISTEN_ADDR: ":8080"
    restart: unless-stopped

  web:
    image: ghcr.io/foylaou/mdm-web:latest
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:80"
    restart: unless-stopped

volumes:
  pgdata:
